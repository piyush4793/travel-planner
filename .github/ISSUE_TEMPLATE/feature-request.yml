name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: "When I'm planning a multi-country trip, I can't see total costs across all countries..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: "Add a trip summary card that totals up budget, days, and cities across all countries in a trip group."
    validations:
      required: false

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - UX / Design
        - Core feature
        - AI / LLM
        - Data / Content
        - Performance
        - Export / Import
        - Mobile / PWA
        - Other
    validations:
      required: false
