<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- Globe circle -->
  <circle cx="96" cy="92" r="48" fill="none" stroke="#fff" stroke-width="3" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="96" cy="92" rx="48" ry="18" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <ellipse cx="96" cy="92" rx="48" ry="36" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <!-- Longitude line -->
  <ellipse cx="96" cy="92" rx="20" ry="48" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.4"/>
  <!-- Compass needle -->
  <polygon points="96,52 102,88 96,84 90,88" fill="#facc15" opacity="0.95"/>
  <polygon points="96,132 102,96 96,100 90,96" fill="#fff" opacity="0.6"/>
  <!-- Text -->
  <text x="96" y="164" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="20" fill="#fff" letter-spacing="1">ROAMWISE</text>
</svg>
