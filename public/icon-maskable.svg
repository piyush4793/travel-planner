<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Maskable: full bleed background, content in safe zone (80% center) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Globe circle (centered in safe zone) -->
  <circle cx="256" cy="236" r="110" fill="none" stroke="#fff" stroke-width="5" opacity="0.9"/>
  <!-- Latitude lines -->
  <ellipse cx="256" cy="236" rx="110" ry="40" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.4"/>
  <ellipse cx="256" cy="236" rx="110" ry="80" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.3"/>
  <!-- Longitude line -->
  <ellipse cx="256" cy="236" rx="46" ry="110" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.4"/>
  <!-- Compass needle -->
  <polygon points="256,142 266,224 256,216 246,224" fill="#facc15" opacity="0.95"/>
  <polygon points="256,330 266,248 256,256 246,248" fill="#fff" opacity="0.6"/>
  <!-- Text -->
  <text x="256" y="410" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-weight="800" font-size="44" fill="#fff" letter-spacing="2">ROAMWISE</text>
</svg>
